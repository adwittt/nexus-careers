global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nexus-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - 'api-gateway:8085'
        - 'auth-service:8081'
        - 'job-service:8082'
        - 'application-service:8083'
        - 'admin-service:8084'
        - 'eureka-server:8761'
        - 'config-server:8888'
