server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: job-service
          uri: http://job-service:8082
          predicates:
            - Path=/api/jobs/**

        - id: application-service
          uri: http://application-service:8083
          predicates:
            - Path=/api/applications/**

        - id: admin-service
          uri: http://admin-service:8084
          predicates:
            - Path=/api/admin/**

        # Swagger doc routes for aggregated UI
        - id: auth-service-docs
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/v3/api-docs
          filters:
            - StripPrefix=2

        - id: job-service-docs
          uri: http://job-service:8082
          predicates:
            - Path=/api/jobs/v3/api-docs
          filters:
            - StripPrefix=2

        - id: application-service-docs
          uri: http://application-service:8083
          predicates:
            - Path=/api/applications/v3/api-docs
          filters:
            - StripPrefix=2

        - id: admin-service-docs
          uri: http://admin-service:8084
          predicates:
            - Path=/api/admin/v3/api-docs
          filters:
            - StripPrefix=2

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://frontend:80"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

jwt:
  secret: nexus-careers-jwt-secret-key-2024-very-long-secret-for-hs256-algorithm-minimum-256-bits
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.nexus: DEBUG
    org.springframework.cloud.gateway: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
      - name: Job Service
        url: /api/jobs/v3/api-docs
      - name: Application Service
        url: /api/applications/v3/api-docs
      - name: Admin Service
        url: /api/admin/v3/api-docs
