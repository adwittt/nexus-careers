name: Nexus Careers CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Build and Test Java Microservices
  java-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - job-service
          - application-service
          - admin-service
          - api-gateway
          - config-server
          - eureka-server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ${{ matrix.service }}
        run: mvn clean package -DskipTests=false

      - name: Build Docker Image (Dry Run)
        working-directory: ${{ matrix.service }}
        run: docker build -t nexus/${{ matrix.service }}:${{ github.sha }} .

  # 2. Build and Test Frontend
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Build Docker Image (Dry Run)
        working-directory: frontend
        run: docker build -t nexus/frontend:${{ github.sha }} .

  # 3. Overall Stack Verification
  compose-verify:
    name: Docker Compose Verification
    needs: [java-build, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Stack
        run: docker compose build
