name: Nexus Careers CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Build and Test Java Microservices (ON YOUR MAC)
  java-build:
    name: Build ${{ matrix.service }}
    runs-on: self-hosted # Changed from ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, job-service, application-service, admin-service, api-gateway, config-server, eureka-server]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Environment
        run: |
          echo "Current Path: $PATH"
          java -version
          /opt/homebrew/bin/mvn -version

      - name: Build with Maven
        working-directory: ${{ matrix.service }}
        run: /opt/homebrew/bin/mvn clean package -DskipTests=true

  # 2. Build and Test Frontend (ON YOUR MAC)
  frontend-build:
    name: Build Frontend
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install and Build
        working-directory: frontend
        run: |
          npm install
          npm run build

  # 3. Overall Stack Deployment
  deploy-to-local:
    name: Deploy to Local Docker
    needs: [java-build, frontend-build]
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Full Stack in Docker Desktop
        run: |
          export PATH=$PATH:/Applications/Docker.app/Contents/Resources/bin
          echo "Starting the deployment on Adwit's Mac..."
          docker compose down
          docker compose up -d --build
