name: Nexus Careers CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Build and Test Java Microservices (ON YOUR MAC)
  java-build:
    name: Build ${{ matrix.service }}
    runs-on: self-hosted
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Applications/Docker.app/Contents/Resources/bin
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, job-service, application-service, admin-service, api-gateway, config-server, eureka-server]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with Maven
        working-directory: ${{ matrix.service }}
        run: mvn clean package -DskipTests=true

  # 2. Build and Test Frontend (ON YOUR MAC)
  frontend-build:
    name: Build Frontend
    runs-on: self-hosted
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Applications/Docker.app/Contents/Resources/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install and Build
        working-directory: frontend
        run: |
          npm install
          npm run build

  # 3. Overall Stack Deployment
  deploy-to-local:
    name: Deploy to Local Docker
    needs: [java-build, frontend-build]
    runs-on: self-hosted
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Applications/Docker.app/Contents/Resources/bin
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Full Stack in Docker Desktop
        run: |
          echo "Cleaning up any conflicting containers..."
          docker ps -a --filter "name=nexus-" --format "{{.Name}}" | xargs docker rm -f || true
          
          echo "Starting the deployment on Adwit's Mac..."
          docker compose -p nexus-careers down --remove-orphans || true
          docker compose -p nexus-careers up -d --build --quiet-pull
          
          echo "Deployment successful. Listing running containers:"
          docker compose -p nexus-careers ps
