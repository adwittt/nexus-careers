# ┬─────────────────────────────────────────────────────────────
# │ Nexus Careers — Full Stack Docker Compose
# │ Start order: Infrastructure → eureka → config → services → frontend
# ┴─────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ────────────────────────────────────────

  mysql:
    image: mysql:8
    container_name: nexus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database-setup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql123"]
      interval: 20s
      timeout: 15s
      retries: 20
    restart: unless-stopped
    networks:
      - nexus-network

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - nexus-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: nexus-zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped
    networks:
      - nexus-network

  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - nexus-network

  loki:
    image: grafana/loki:latest
    container_name: nexus-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - nexus-network

  promtail:
    image: grafana/promtail:latest
    container_name: nexus-promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - nexus-network

  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - nexus-network

  sonarqube:
    image: sonarqube:10-community
    container_name: nexus-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_FORCEAUTHENTICATION=false
      - SONAR_JVMOPTS=-Xmx1g -Xms512m
      - SONAR_CE_JVMOPTS=-Xmx512m -Xms256m
      - SONAR_WEB_JVMOPTS=-Xmx512m -Xms256m
      - SONAR_SEARCH_JAVAOPTS=-Xmx256m -Xms256m
      - SONAR_ES_BOOTSTRAP_CHECKS_ENABLED=false
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped
    networks:
      - nexus-network

  # ── Service Discovery ─────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: nexus-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 15
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - nexus-network

  # ── Centralized Config ────────────────────────────────────

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: nexus-config
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 15
    environment:
      - SPRING_PROFILES_ACTIVE=native,docker
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config-repo/
    volumes:
      - ./config-repo:/config-repo
    restart: unless-stopped
    networks:
      - nexus-network

  # ── Microservices ─────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: nexus-auth
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
    restart: unless-stopped
    networks:
      - nexus-network

  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile
    container_name: nexus-job
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - nexus-network

  application-service:
    build:
      context: ./application-service
      dockerfile: Dockerfile
    container_name: nexus-application
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      job-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - nexus-network

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: nexus-admin
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - nexus-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: nexus-gateway
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      application-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 15
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - nexus-network

  # ── Frontend ──────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus-network

# ── Volumes & Network ────────────────────────────────────────

volumes:
  mysql_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  nexus-network:
    driver: bridge
