server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://mysql:3306/nexus_auth_db?createDatabaseIfNotExist=true
    username: root
    password: mysql123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway for DB migrations (optional, handled by ddl-auto here)
  flyway:
    enabled: false

  mail:
    host: localhost
    port: 2525
    username: test
    password: test
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
            scope: profile, email
          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID:linkedin-client-id}
            client-secret: ${LINKEDIN_CLIENT_SECRET:linkedin-client-secret}
            scope: r_liteprofile, r_emailaddress
            client-name: LinkedIn
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/me
            user-name-attribute: id

# JWT Configuration
jwt:
  secret: nexus-careers-jwt-secret-key-2024-very-long-secret-for-hs256-algorithm-minimum-256-bits
  expiration: 86400000  # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms

# Logging
logging:
  level:
    com.nexus: DEBUG
    org.springframework.security: DEBUG

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
