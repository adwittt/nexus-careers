server:
  port: 8082
  tomcat:
    accesslog:
      enabled: true
      pattern: '%h %l %u %t \"%r\" %s %b %D \"%{X-User-Id}i\"'

spring:
  application:
    name: job-service

  data:
    redis:
      host: redis
      port: 6379
  cache:
    type: redis

  datasource:
    url: jdbc:mysql://mysql:3306/nexus_job_db?createDatabaseIfNotExist=true
    username: root
    password: mysql123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: nexus-careers-jwt-secret-key-2024-very-long-secret-for-hs256-algorithm-minimum-256-bits
  expiration: 86400000

logging:
  level:
    com.nexus: DEBUG

springdoc:
  api-docs:
    path: /api/jobs/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
